<!DOCTYPE html>
<html>
<head>

  <title>Absensi Online</title>

  <style>
  body {
  font-family: Arial, sans-serif;
  background: white;
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* LOGO */
.header {
  text-align: center;
  margin-bottom: 35px; /* ini yang bikin jarak jelas */
}

.logo {
  width: 600px;
}

/* CARD */
.container {
  width: 95%;
  max-width: 650px; /* diperbesar */
  background: black;
  border-radius: 20px;
  padding: 45px 30px; /* diperbesar */
  box-sizing: border-box;
}

/* TITLE */
h2 {
  text-align: center;
  margin-bottom: 25px;
  font-size: 26px; /* diperbesar */
  color: white;
}

/* INPUT */
select {
  width: 100%;
  padding: 16px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  margin-bottom: 20px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 16px;
  font-size: 18px;
  background: yellow;
  color: black;
  border: none;
  border-radius: 12px;
  cursor: pointer;
}

/* STATUS */
.status {
  margin-top: 15px;
  text-align: center;
  font-size: 16px;
}

.loading { color: orange; }
.success { color: #00ff88; }
.error { color: red; }
  </style>
  
</head>

<body>
    <div class="header">

  </div>

  <div class="container">
